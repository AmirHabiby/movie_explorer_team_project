<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Details</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="details-page">
    <div class="poster-section">
      <img id="details-poster" src="" alt="Movie Poster">
    </div>
    <div class="info-section">
      <h1 id="details-title">Movie Title</h1>
      <p id="details-description">Description</p>
      <div class="meta">
        <span class="rating">Rating<span id="details-rating"></span></span>
        <span class="release">Release Date <span id="details-release"></span></span>
      </div>
      <a href="index.html" class="back-button">← Back to Movies</a>
    </div>
  </div>
  <script src="details.js"></script>
</body>
</html>
